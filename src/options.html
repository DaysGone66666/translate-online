<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="page-title">
      <span class="op-logo">T</span>
      <span>Translate Online 设置</span>
    </div>

    <section class="section">
      <h2 class="section-title">翻译引擎</h2>
      <div class="engine-group">
        <label class="radio-label">
          <input type="radio" name="engine" value="free">
          <span class="radio-text">🌐 免费引擎</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="engine" value="deepseek">
          <span class="radio-text">🧠 DeepSeek</span>
        </label>
      </div>
    </section>

    <section class="section" id="deepseek-config">
      <h2 class="section-title">DeepSeek 配置</h2>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input type="password" id="api-key" class="form-input" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx">
      </div>
      <div class="form-group">
        <label class="form-label">模型</label>
        <select id="model" class="form-select">
          <option value="deepseek-chat">deepseek-chat</option>
          <option value="deepseek-reasoner">deepseek-reasoner</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">API 地址</label>
        <input type="text" id="api-url" class="form-input" value="https://api.deepseek.com" placeholder="https://api.deepseek.com">
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">翻译偏好</h2>
      <div class="form-group">
        <label class="form-label">目标语言</label>
        <select id="target-lang" class="form-select">
          <option value="zh-CN">中文（简体）</option>
          <option value="zh-TW">中文（繁体）</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="es">Español</option>
        </select>
      </div>
      <div class="chip-group">
        <label class="chip chip-active">
          <input type="checkbox" id="trigger-select" checked style="display:none">
          <span>✓ 划词自动翻译</span>
        </label>
        <span class="chip chip-inactive">快捷键</span>
        <label class="chip chip-inactive">
          <input type="checkbox" id="trigger-contextmenu" checked style="display:none">
          <span>右键菜单</span>
        </label>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">快捷键</h2>
      <div class="form-group">
        <label class="form-label">翻译选中文本</label>
        <div class="shortcut-row">
          <div class="shortcut-display" id="shortcut-display">Ctrl+Shift+E</div>
          <button id="btn-record-shortcut" class="btn btn-small btn-secondary">录制</button>
          <button id="btn-reset-shortcut" class="btn btn-small btn-secondary">重置</button>
        </div>
        <div id="shortcut-recorder" class="shortcut-recorder" style="display:none">
          <p class="shortcut-hint">请按下新的快捷键组合...</p>
          <div id="shortcut-keys" class="shortcut-recorder-keys"></div>
          <div class="shortcut-recorder-actions">
            <button id="btn-save-shortcut" class="btn btn-primary btn-small">保存</button>
            <button id="btn-cancel-shortcut" class="btn btn-secondary btn-small">取消</button>
          </div>
        </div>
        <p class="shortcut-footnote">也可在 <a href="#" id="link-edge-shortcuts">edge://extensions/shortcuts</a> 手动修改</p>
      </div>
    </section>

    <div class="actions">
      <button id="btn-save" class="btn btn-primary">保存设置</button>
      <button id="btn-test" class="btn btn-secondary">测试连接</button>
    </div>

    <div id="status-message" class="status-message"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
